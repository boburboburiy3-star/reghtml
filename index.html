<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2PL IRT Test Platformasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script defer src="https://unpkg.com/mathlive@0.98.5/dist/mathlive.min.js"></script>
    <style>
        :root {
            --tg-theme-bg: var(--tg-theme-bg-color, #f4f6f9);
            --tg-theme-text: var(--tg-theme-text-color, #222);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --primary: #248bcf;
            --kb-height: 0px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg);
            color: var(--tg-theme-text);
            margin: 0; padding: 15px;
            padding-bottom: calc(80px + var(--kb-height));
            transition: padding-bottom 0.25s ease;
        }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 15px; }
        .header h2 { margin: 0; color: var(--primary); }
        .section-title { font-size: 18px; font-weight: bold; margin: 20px 0 10px 0; color: #555; border-left: 4px solid var(--primary); padding-left: 8px; }
        .q-card { background: var(--card-bg); padding: 16px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .q-title { font-weight: 600; margin-bottom: 12px; font-size: 15px; }
        .options-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .option-btn input { display: none; }
        .option-btn label {
            display: block; text-align: center; background: rgba(0,0,0,0.03);
            border: 1px solid #ccc; padding: 12px 0; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: 0.2s; user-select: none;
        }
        .option-btn input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }
        math-field {
            width: 100%; font-size: 22px; border: 2px solid #ccc; border-radius: 8px;
            padding: 12px; background: white; color: black; outline: none;
            min-height: 52px; display: block;
        }
        math-field:focus-within { border-color: var(--primary); }

        /* Matn rejimi input */
        .text-answer {
            width: 100%; font-size: 17px; border: 2px solid #ccc; border-radius: 8px;
            padding: 13px 12px; background: white; color: black; outline: none;
            display: none; font-family: inherit;
            transition: border-color 0.2s;
        }
        .text-answer:focus { border-color: var(--primary); }

        /* Rejim almashtirish tugmalari */
        .mode-toggle { display: flex; gap: 7px; margin-bottom: 10px; }
        .mode-btn {
            flex: 1; padding: 8px 0; font-size: 12px; font-weight: 700;
            border: 1.5px solid #ccc; border-radius: 8px;
            background: rgba(0,0,0,0.03); color: #777; cursor: pointer;
            user-select: none; -webkit-tap-highlight-color: transparent;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .submit-container { text-align: center; margin-top: 30px; margin-bottom: 20px; }
        .btn-submit {
            width: 100%; max-width: 400px; background: var(--primary); color: white;
            border: none; padding: 15px; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(36,139,207,0.3);
        }

        /* Maxsus klaviatura */
        #custom-kb {
            display: none; position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1c1c1e; z-index: 9999;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
        }
        #custom-kb.visible { display: block; }
        .kb-tabs {
            display: flex; background: #111; border-bottom: 1px solid #333;
            overflow-x: auto; scrollbar-width: none;
        }
        .kb-tabs::-webkit-scrollbar { display: none; }
        .kb-tab {
            flex: 1; min-width: 60px; padding: 9px 4px; color: #888;
            font-size: 11px; font-weight: 600; text-align: center; cursor: pointer;
            border-bottom: 2px solid transparent; white-space: nowrap;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .kb-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .kb-panel { display: none; padding: 8px 6px 16px; }
        .kb-panel.active { display: block; }
        .kb-row { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
        .kb-btn {
            flex: 1; background: #3a3a3c; color: white; border: none;
            border-radius: 8px; padding: 0 2px; font-size: 14px; font-weight: 600;
            cursor: pointer; text-align: center; height: 44px;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            -webkit-tap-highlight-color: transparent; user-select: none; line-height: 1.1; min-width: 0;
        }
        .kb-btn:active { opacity: 0.6; }
        .kb-btn sub, .kb-btn sup { font-size: 9px; }
        .kb-btn small { font-size: 9px; opacity: 0.65; margin-top: 1px; }
        .kb-btn.blue   { background: #1a5f8a; }
        .kb-btn.green  { background: #1e6b45; }
        .kb-btn.purple { background: #5b3a8a; }
        .kb-btn.orange { background: #8a4f1a; }
        .kb-btn.gray   { background: #48484a; }
        .kb-btn.wide   { flex: 1.5; }
        .kb-btn.del    { background: #5a1a1a; font-size: 18px; }
        .kb-btn.clr    { background: #7a1a1a; font-size: 11px; font-weight: 700; line-height: 1.2; }
    </style>
</head>

        </div>
        <div class="kb-row">
            <button class="kb-btn orange" onclick="ins('\\rightarrow')">&#8594;</button>
            <button class="kb-btn orange" onclick="ins('\\leftarrow')">&#8592;</button>
            <button class="kb-btn orange" onclick="ins('\\leftrightarrow')">&#8596;</button>
            <button class="kb-btn orange" onclick="ins('\\Rightarrow')">&#8658;</button>
            <button class="kb-btn orange" onclick="ins('\\Leftrightarrow')">&#8660;</button>
            <button class="kb-btn" onclick="ins('\\forall')">&#8704;</button>
            <button class="kb-btn" onclick="ins('\\exists')">&#8707;</button>
        </div>
        <div class="kb-row">
            <button class="kb-btn purple" onclick="ins('\\binom{\\placeholder{}}{\\placeholder{}}')">C<sub>n</sub><sup>k</sup><br><small>kombinat.</small></button>
            <button class="kb-btn purple" onclick="ins('\\overline{\\placeholder{}}')">x&#772;<br><small>o'rta</small></button>
            <button class="kb-btn purple" onclick="ins('\\hat{\\placeholder{}}')">x&#770;</button>
            <button class="kb-btn purple" onclick="ins('\\dot{\\placeholder{}}')">x&#775;</button>
            <button class="kb-btn" onclick="ins('\\cdot')">&#183;</button>
            <button class="kb-btn" onclick="ins('\\ldots')">&#8230;</button>
            <button class="kb-btn" onclick="ins('\\infty')">&#8734;</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // ════════════════════════════════════════════════
    // URL parametrlardan savollar sonini o'qish
    // ════════════════════════════════════════════════
    const params = new URLSearchParams(window.location.search);
    const _c = parseInt(params.get('closed'));
    const _o = parseInt(params.get('open'));
    const CLOSED_COUNT = Math.max(0, isNaN(_c) ? 35 : _c);
    const OPEN_COUNT   = Math.max(0, isNaN(_o) ? 10 : _o);
    const TOTAL        = CLOSED_COUNT + OPEN_COUNT;

    if (CLOSED_COUNT === 0) {
        document.getElementById('closed-section').style.display = 'none';
    } else {
        document.getElementById('closed-title').textContent =
           'I Qism. Variantli savollar (1\u2013' + CLOSED_COUNT + ')';
    }

    if (OPEN_COUNT === 0) {
        document.getElementById('open-section').style.display = 'none';
    } else {
        const openStart = CLOSED_COUNT + 1;
        const part = CLOSED_COUNT > 0 ? 'II' : 'I';
        document.getElementById('open-title').textContent =
            part + ' Qism. Ochiq savollar (' + openStart + '\u2013' + TOTAL + ')';
    }

    // ── Yopiq savollar (A/B/C/D) ──
    const closedContainer = document.getElementById('closed-container');
    for (let i = 1; i <= CLOSED_COUNT; i++) {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML =
            '<div class="q-title">' + i + '-savol varianti:</div>' +
            '<div class="options-group">' +
            ['A','B','C','D'].map(v =>
                '<div class="option-btn">' +
                '<input type="radio" name="q_' + i + '" id="q_' + i + '_' + v + '" value="' + v + '">' +
                '<label for="q_' + i + '_' + v + '">' + v + '</label>' +
                '</div>'
            ).join('') +
            '</div>';
        closedContainer.appendChild(card);
    }

    // ════════════════════════════════════════════════
    // Ochiq savollar — Formula + Matn rejimi bilan
    // ════════════════════════════════════════════════
    const openContainer = document.getElementById('open-container');
    const openIds = [];
    const qMode  = {};   // 'f' = formula, 't' = matn

    for (let i = 0; i < OPEN_COUNT; i++) {
        const qNum = CLOSED_COUNT + i + 1;
        const qId  = 'open_' + i;
        openIds.push(qId);
        qMode[qId] = 'f';

        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML =
            '<div class="q-title">' + qNum + '-savol javobi:</div>' +

            // Rejim tugmalari
            '<div class="mode-toggle">' +
            '<button type="button" class="mode-btn active" ' +
                'id="mode_f_' + qId + '" ' +
                'onclick="setMode(\'' + qId + '\',\'f\')">&#129518; Formula</button>' +
            '<button type="button" class="mode-btn" ' +
                'id="mode_t_' + qId + '" ' +
                'onclick="setMode(\'' + qId + '\',\'t\')">&#128288; Matn (so\'z)</button>' +
            '</div>' +

            // Formula maydoni
            '<math-field id="mf_' + qId + '" math-virtual-keyboard-policy="off"></math-field>' +

            // Matn maydoni
            '<input type="text" id="tx_' + qId + '" class="text-answer" ' +
                'placeholder="Javobingizni shu yerga yozing..." ' +
                'autocomplete="off" autocapitalize="off" spellcheck="false">';

        openContainer.appendChild(card);
    }

    // ════════════════════════════════════════════════
    // Rejimni almashtirish
    // ════════════════════════════════════════════════
    function setMode(qId, mode) {
        qMode[qId] = mode;
        const mf   = document.getElementById('mf_' + qId);
        const tx   = document.getElementById('tx_' + qId);
        const btnF = document.getElementById('mode_f_' + qId);
        const btnT = document.getElementById('mode_t_' + qId);

        if (mode === 't') {
            mf.style.display = 'none';
            tx.style.display = 'block';
            btnF.classList.remove('active');
            btnT.classList.add('active');
            // Maxsus klaviaturani yashir — telefon klaviaturasi chiqadi
            hideKb();
            tx.focus();
        } else {
            tx.style.display = 'none';
            mf.style.display = 'block';
            btnT.classList.remove('active');
            btnF.classList.add('active');
            mf.focus();
        }
    }

    // Joriy rejimga qarab javobni olish
    function getOpenAnswer(qId) {
        if (qMode[qId] === 't') {
            const tx = document.getElementById('tx_' + qId);
            return (tx && tx.value) ? tx.value.trim() : '';
        }
        const mf = document.getElementById('mf_' + qId);
        return (mf && mf.value) ? mf.value.trim() : '';
    }

    // ════════════════════════════════════════════════
    // Scroll va klaviatura boshqaruvi
    // ════════════════════════════════════════════════
    const kb = document.getElementById('custom-kb');
    let activeMf  = null;
    let kbVisible = false;

    function updateBodyPadding(h) {
        document.documentElement.style.setProperty('--kb-height', h + 'px');
    }

    function scrollToActiveMf() {
        if (!activeMf) return;
        const kbH  = kb.offsetHeight;
        const rect = activeMf.getBoundingClientRect();
        const safe = window.innerHeight - kbH - 16;
        if (rect.bottom > safe) {
            window.scrollBy({ top: rect.bottom - safe, behavior: 'smooth' });
        }
    }

    function showKb() {
        if (kbVisible) return;
        kb.classList.add('visible');
        kbVisible = true;
        requestAnimationFrame(function() {
            updateBodyPadding(kb.offsetHeight);
            setTimeout(scrollToActiveMf, 150);
        });
    }

    function hideKb() {
        if (!kbVisible) return;
        kb.classList.remove('visible');
        kbVisible = false;
        updateBodyPadding(0);
        activeMf = null;
    }

    tg.onEvent('viewportChanged', function() {
        if (kbVisible && activeMf) setTimeout(scrollToActiveMf, 200);
    });

    function switchTab(idx) {
        document.querySelectorAll('.kb-tab').forEach(function(t, i) { t.classList.toggle('active', i === idx); });
        document.querySelectorAll('.kb-panel').forEach(function(p, i) { p.classList.toggle('active', i === idx); });
    }

    // Math-field'larni ishga tushirish
    function initMathFields() {
        openIds.forEach(function(id) {
            const mf = document.getElementById('mf_' + id);
            if (!mf) return;
            mf.mathVirtualKeyboardPolicy = 'off';
            mf.addEventListener('focusin', function() {
                activeMf = mf;
                showKb();
            });
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            customElements.whenDefined('math-field').then(initMathFields);
        });
    } else {
        customElements.whenDefined('math-field').then(initMathFields);
    }

    // Shadow DOM muammosini hal qiluvchi yopish
    document.addEventListener('pointerdown', function(e) {
        if (kb.contains(e.target)) return;
        const mfEls = document.querySelectorAll('math-field');
        const insideMf = Array.prototype.some.call(mfEls, function(mf) {
            return mf === e.target || mf.contains(e.target);
        });
        if (!insideMf) hideKb();
    });

    // ════════════════════════════════════════════════
    // Klaviatura tugma funksiyalari
    // ════════════════════════════════════════════════
    function ins(latex) {
        if (!activeMf) return;
        activeMf.executeCommand(['insert', latex, {
            insertionMode: 'replaceSelection',
            selectionMode: 'placeholder'
        }]);
    }

    // Prime (shtrix) belgisi: f', x'', y''' kabi
    function insPrime() {
        ins("'");
    }

    function kbDel() {
        if (!activeMf) return;
        activeMf.executeCommand('deleteBackward');
    }

    function kbClear() {
        if (!activeMf) return;
        activeMf.setValue('');
    }

    // ════════════════════════════════════════════════
    // Javoblarni yuborish
    // ════════════════════════════════════════════════
    function sendAllAnswers() {
        let emptyCount = 0;
        for (let i = 1; i <= CLOSED_COUNT; i++) {
            if (!document.querySelector('input[name="q_' + i + '"]:checked')) emptyCount++;
        }
        let emptyOpenCount = 0;
        openIds.forEach(function(id) {
            if (getOpenAnswer(id) === '') emptyOpenCount++;
        });

        if (emptyCount > 0 || emptyOpenCount > 0) {
            const parts = [];
            if (emptyCount > 0) parts.push(emptyCount + ' ta variantli savol');
            if (emptyOpenCount > 0) parts.push(emptyOpenCount + ' ta ochiq savol');
            const ok = confirm('\u26a0\ufe0f ' + parts.join(' va ') + ' javobsiz qolgan!\n\nBaribir yuborasizmi?');
            if (!ok) return;
        }

        const result = { closed_answers: [], open_answers: [] };
        for (let i = 1; i <= CLOSED_COUNT; i++) {
            const checked = document.querySelector('input[name="q_' + i + '"]:checked');
            result.closed_answers.push(checked ? checked.value : '\u2014');
        }
        openIds.forEach(function(id) {
            result.open_answers.push(getOpenAnswer(id));
        });

        // To'g'ri UTF-8 bayt uzunligini hisoblash
        const jsonStr = JSON.stringify(result);
        const byteLen = new TextEncoder().encode(jsonStr).length;
        if (byteLen > 4000) {
            alert('\u274c Javoblar hajmi juda katta! Formulalarni qisqartiring.');
            return;
        }

        tg.sendData(jsonStr);
        tg.close();
    }
</script>
</body>
</html>
