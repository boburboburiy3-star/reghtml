<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2PL IRT Test Platformasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script defer src="https://unpkg.com/mathlive@0.98.5/dist/mathlive.min.js"></script>
    <style>
        :root {
            --tg-theme-bg: var(--tg-theme-bg-color, #f4f6f9);
            --tg-theme-text: var(--tg-theme-text-color, #222);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --primary: #248bcf;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg);
            color: var(--tg-theme-text);
            margin: 0; padding: 15px;
            padding-bottom: 80px;
        }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 15px; }
        .header h2 { margin: 0; color: var(--primary); }
        .section-title { font-size: 18px; font-weight: bold; margin: 20px 0 10px 0; color: #555; border-left: 4px solid var(--primary); padding-left: 8px; }
        .q-card { background: var(--card-bg); padding: 16px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .q-title { font-weight: 600; margin-bottom: 12px; font-size: 15px; }
        .options-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .option-btn input { display: none; }
        .option-btn label {
            display: block; text-align: center; background: rgba(0,0,0,0.03);
            border: 1px solid #ccc; padding: 12px 0; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: 0.2s; user-select: none;
        }
        .option-btn input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }
        math-field {
            width: 100%; font-size: 22px; border: 2px solid #ccc; border-radius: 8px;
            padding: 12px; background: white; color: black; outline: none;
            min-height: 52px; display: block;
        }
        math-field:focus-within { border-color: var(--primary); }
        .submit-container { text-align: center; margin-top: 30px; margin-bottom: 50px; }
        .btn-submit {
            width: 100%; max-width: 400px; background: var(--primary); color: white;
            border: none; padding: 15px; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(36,139,207,0.3);
        }

        /* ══════════════════════════════════════════
           CUSTOM KLAVIATURA
        ══════════════════════════════════════════ */
        #custom-kb {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1c1c1e;
            z-index: 9999;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
        }
        #custom-kb.visible { display: block; }

        /* Tab bar */
        .kb-tabs {
            display: flex;
            background: #111;
            border-bottom: 1px solid #333;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .kb-tabs::-webkit-scrollbar { display: none; }
        .kb-tab {
            flex: 1; min-width: 60px;
            padding: 9px 4px;
            color: #888;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .kb-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Panel */
        .kb-panel { display: none; padding: 8px 6px 16px; }
        .kb-panel.active { display: block; }

        /* Tugma qatorlari */
        .kb-row {
            display: flex; gap: 5px;
            justify-content: center;
            margin-bottom: 5px;
        }
        .kb-btn {
            flex: 1;
            background: #3a3a3c;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 2px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            height: 44px;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            line-height: 1.1;
            min-width: 0;
        }
        .kb-btn:active { opacity: 0.6; }
        .kb-btn sub, .kb-btn sup { font-size: 9px; }
        .kb-btn small { font-size: 9px; opacity: 0.65; margin-top: 1px; }

        .kb-btn.blue   { background: #1a5f8a; }
        .kb-btn.green  { background: #1e6b45; }
        .kb-btn.purple { background: #5b3a8a; }
        .kb-btn.orange { background: #8a4f1a; }
        .kb-btn.red    { background: #8a1a1a; }
        .kb-btn.gray   { background: #48484a; }
        .kb-btn.dark   { background: #2c2c2e; }

        /* O'chirish va navigatsiya katta tugmalar */
        .kb-btn.wide { flex: 1.5; }
        .kb-btn.del  { background: #5a1a1a; font-size: 18px; }
    </style>
</head>

        </div>
    </div>

</div><!-- /#custom-kb -->

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // ── Yopiq savollar (1-35) ──
    const closedContainer = document.getElementById('closed-container');
    for (let i = 1; i <= 35; i++) {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `
            <div class="q-title">${i}-savol varianti:</div>
            <div class="options-group">
                <div class="option-btn"><input type="radio" name="q_${i}" id="q_${i}_A" value="A"><label for="q_${i}_A">A</label></div>
                <div class="option-btn"><input type="radio" name="q_${i}" id="q_${i}_B" value="B"><label for="q_${i}_B">B</label></div>
                <div class="option-btn"><input type="radio" name="q_${i}" id="q_${i}_C" value="C"><label for="q_${i}_C">C</label></div>
                <div class="option-btn"><input type="radio" name="q_${i}" id="q_${i}_D" value="D"><label for="q_${i}_D">D</label></div>
            </div>`;
        closedContainer.appendChild(card);
    }

    // ── Ochiq savollar (36-45) ──
    const openContainer = document.getElementById('open-container');
    let openIds = [];
    for (let i = 36; i <= 45; i++) {
        ['a', 'b'].forEach(sub => {
            const qId = `${i}_${sub}`;
            openIds.push(qId);
            const card = document.createElement('div');
            card.className = 'q-card';
            card.innerHTML = `
                <div class="q-title">${i} ${sub}) savol javobi (Matematik formula):</div>
                <math-field id="mf_${qId}" math-virtual-keyboard-policy="off"></math-field>`;
            openContainer.appendChild(card);
        });
    }

    // ── Klaviatura tab almashtirish ──
    function switchTab(idx) {
        document.querySelectorAll('.kb-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('.kb-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
    }

    // ── Math field focus (DOMContentLoaded + customElements ikkalasini kutadi) ──
    let activeMf = null;
    const kb = document.getElementById('custom-kb');

    function initMathFields() {
        openIds.forEach(id => {
            const mf = document.getElementById(`mf_${id}`);
            if (!mf) return;
            mf.mathVirtualKeyboardPolicy = 'off';
            mf.addEventListener('focusin', () => {
                activeMf = mf;
                kb.classList.add('visible');
                // Klaviatura balandligini hisoblab scroll qilish
                setTimeout(() => {
                    const kbHeight = kb.offsetHeight;
                    const rect = mf.getBoundingClientRect();
                    const visibleBottom = window.innerHeight - kbHeight;
                    if (rect.bottom > visibleBottom) {
                        window.scrollBy({ top: rect.bottom - visibleBottom + 10, behavior: 'smooth' });
                    }
                }, 300);
            });
        });
    }

    // DOM tayyor bo'lgandan keyin math-field custom element yuklanishini kutish
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            customElements.whenDefined('math-field').then(initMathFields);
        });
    } else {
        customElements.whenDefined('math-field').then(initMathFields);
    }

    // ── Klaviaturani yopish (scroll yoki boshqa joyga bosish) ──
    document.addEventListener('pointerdown', (e) => {
        if (kb.contains(e.target)) return;
        if (!e.target.closest('math-field')) {
            kb.classList.remove('visible');
            activeMf = null;
        }
    });



    // ── Latex kiritish ──
    function ins(latex) {
        if (!activeMf) return;
        activeMf.focus();
        activeMf.executeCommand(['insert', latex, {
            insertionMode: 'replaceSelection',
            selectionMode: 'placeholder'
        }]);
    }

    function kbDel() {
        if (!activeMf) return;
        activeMf.focus();
        activeMf.executeCommand('deleteBackward');
    }

    // ── Javoblarni yuborish ──
    function sendAllAnswers() {
        // 1. Bo'sh ABCD javoblarini tekshirish
        let emptyCount = 0;
        for (let i = 1; i <= 35; i++) {
            const checked = document.querySelector(`input[name="q_${i}"]:checked`);
            if (!checked) emptyCount++;
        }

        // 2. Foydalanuvchidan tasdiqlash so'rash (agar bo'sh javob bo'lsa)
        if (emptyCount > 0) {
            const ok = confirm(`⚠️ ${emptyCount} ta savol javobsiz qolgan!\n\nBaribir yuborasizmi?`);
            if (!ok) return;
        }

        // 3. Ma'lumotlarni yig'ish
        let result = { closed_answers: [], open_answers: [] };
        for (let i = 1; i <= 35; i++) {
            const checked = document.querySelector(`input[name="q_${i}"]:checked`);
            result.closed_answers.push(checked ? checked.value : "—");
        }
        openIds.forEach(id => {
            const mf = document.getElementById(`mf_${id}`);
            result.open_answers.push(mf && mf.value ? mf.value.trim() : "");
        });

        // 4. Hajmni tekshirish (Telegram 4096 bayt limiti)
        const jsonStr = JSON.stringify(result);
        if (jsonStr.length > 4000) {
            alert('❌ Javoblar hajmi juda katta! Formulalarni qisqartiring.');
            return;
        }

        tg.sendData(jsonStr);
        tg.close();
    }
</script>
</body>
</html>
